server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:6543}/${DB_NAME:postgres}?sslmode=require
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      minimum-idle: 1          
      maximum-pool-size: 10
      idle-timeout: 10000      
      max-lifetime: 30000     
      connection-timeout: 10000 
      keepalive-time: 60000
      connection-test-query: SELECT 1
      data-source-properties:
        prepareThreshold: 0               # disable server-side prepared stmts (PgBouncer transaction mode)
        preparedStatementCacheQueries: 0
        preparedStatementCacheSqlLimit: 0
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "1"
    out-of-order: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
          fetch_size: 50
        generate_statistics: false
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
  task:
    scheduling:
      pool:
        size: 2   # isolated cron thread pool; separate from @Async mail threads
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100

cortex:
  jwt:
    secret: ${CORTEX_JWT_SECRET:${JWT_SECRET:your-256-bit-secret}}
    expiration-ms: 604800000        # 7 days
    extension-expiration-ms: 2592000000  # 30 days
  encryption:
    key: ${CORTEX_ENCRYPTION_KEY:${ENCRYPTION_KEY:Kclxcd4KRneZx+7tVEkvp0gVRzxwz0/3Ml2KOA3zxmk=}}
  stripe:
    api-key: ${STRIPE_API_KEY:sk_test_123}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_123}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,https://localhost:3000,http://127.0.0.1:3000}

spring.mail:
  host: ${SMTP_HOST:smtp.gmail.com}
  port: ${SMTP_PORT:587}
  username: ${SMTP_USERNAME:}
  password: ${SMTP_PASSWORD:}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true

logging:
  level:
    root: INFO
    com.cortex.api.service.AuthService: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"
