server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:6543}/${DB_NAME:postgres}?sslmode=require&currentSchema=public&prepareThreshold=0
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      # Sized for Supabase pooler: session mode caps ~15 clients on free tier,
      # transaction mode (port 6543) also works best with a small pool.
      # Override per-deployment via DB_POOL_MIN / DB_POOL_MAX env vars.
      minimum-idle: ${DB_POOL_MIN:1}
      maximum-pool-size: ${DB_POOL_MAX:5}
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000
      keepalive-time: 60000
      connection-test-query: SELECT 1
      # Fail fast on startup instead of blocking health checks.
      initialization-fail-timeout: 0
      data-source-properties:
        prepareThreshold: 0               # disable server-side prepared stmts (PgBouncer transaction mode)
        preparedStatementCacheQueries: 0
        preparedStatementCacheSqlLimit: 0
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "1"
    out-of-order: true
    validate-on-migrate: false
    locations: classpath:db/migration

  jpa:
    hibernate:
      # 'validate' means Hibernate verifies schema matches entities at startup
      # but NEVER modifies the schema. All schema changes MUST go through
      # Flyway migrations (src/main/resources/db/migration).
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
          fetch_size: 50
        generate_statistics: false
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
  task:
    scheduling:
      pool:
        size: 2   # isolated cron thread pool; separate from @Async mail threads
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100

cortex:
  jwt:
    secret: ${CORTEX_JWT_SECRET}      # Removed insecure fallback: your-256-bit-secret
    expiration-ms: 604800000        # 7 days
    extension-expiration-ms: 2592000000  # 30 days
  encryption:
    key: ${CORTEX_ENCRYPTION_KEY}     # Removed insecure fallback: Kclxcd...
  stripe:
    api-key: ${STRIPE_API_KEY}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET}
  cookie:
    secure: ${CORTEX_COOKIE_SECURE:true}
  app:
    url: ${CORTEX_APP_URL:http://localhost:3000}
  mail:
    enabled: ${CORTEX_MAIL_ENABLED:false}
  gemini:
    base-url: ${CORTEX_GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
    api-key:  ${GEMINI_API_KEY:}
    model:    ${CORTEX_GEMINI_MODEL:gemini-2.0-flash}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,https://localhost:3000,http://127.0.0.1:3000}

spring.mail:
  host: ${SMTP_HOST:smtp.gmail.com}
  port: ${SMTP_PORT:587}
  username: ${SMTP_USERNAME:}
  password: ${SMTP_PASSWORD:}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true

logging:
  level:
    root: INFO
    com.cortex.api: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"
